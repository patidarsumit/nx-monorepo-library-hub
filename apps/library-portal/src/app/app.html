<main class="product-tile product-tile--parchment">
  <section class="content-lockup">
    <p class="eyebrow">Tailwind theme tokens are active</p>
    <h1 class="hero-display">Library Hub</h1>
    <p class="lead-copy">
      A design foundation is now in place for light and dark mode, using shared
      CSS variables instead of hardcoded template colors.
    </p>

    <div class="button-row" aria-label="Design setup actions">
      <a class="button-primary" href="/">Explore books</a>
      <a class="button-secondary-pill" href="/">View reports</a>
    </div>

    <lib-card tone="muted">
      <div class="smoke-grid">
        <div class="smoke-stack">
          <lib-badge tone="success">Shared UI smoke test</lib-badge>
          <lib-input
            label="Book title"
            placeholder="Clean Code"
            [field]="smokeForm.title"
          />
          <lib-search-input
            placeholder="Search catalog"
            [field]="smokeForm.search"
          />
          <lib-checkbox
            label="Available for borrowing"
            [field]="smokeForm.available"
          />
        </div>

        <div class="smoke-stack">
          <lib-stat-card
            label="Components"
            value="26"
            hint="Foundation, layout, forms"
          />
          <div class="button-row">
            <lib-button>Save draft</lib-button>
            <lib-button variant="secondary">Cancel</lib-button>
            <lib-spinner size="sm" />
          </div>
        </div>
      </div>
    </lib-card>
  </section>
</main>

<router-outlet></router-outlet>
