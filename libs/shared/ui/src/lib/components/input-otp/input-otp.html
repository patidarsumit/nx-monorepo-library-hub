<div class="ui-control">
  @if (label()) {
    <label class="ui-control__label" [for]="controlId()">{{ label() }}</label>
  }

  @if (field(); as controlField) {
    @if (!controlField().hidden()) {
      <input
        class="ui-otp"
        [id]="controlId()"
        inputmode="numeric"
        autocomplete="one-time-code"
        [formField]="controlField"
      />
    }
  } @else {
    <input
      class="ui-otp"
      [id]="controlId()"
      inputmode="numeric"
      autocomplete="one-time-code"
      [attr.maxlength]="length()"
      [attr.pattern]="pattern()"
    />
  }
</div>
