<fieldset class="ui-radio-group">
  @if (label()) {
    <legend>{{ label() }}</legend>
  }

  @for (option of options(); track option.value) {
    <label>
      <input
        type="radio"
        [name]="groupName()"
        [checked]="isSelected(option.value)"
        (change)="choose(option.value)"
      />
      {{ option.label }}
    </label>
  }
</fieldset>
